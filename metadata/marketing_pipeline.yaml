pipeline: marketing_pipeline

settings:
  concurrency: 10
  timeoutInSeconds: 21600

defaults:
  retry: 1
  retryIntervalInSeconds: 20
  timeoutPerCellInSeconds: 120

activities:

  - name: Load_Dim_Customer
    path: Load_Dim_Customer
    args:
      source: google_ads
      date_range: last_30_days
    
  - name: Load_Dim_Project
    path: Load_Dim_Project
    args:
      source: meta_ads
      date_range: last_30_days
    dependencies:
      - Load_Dim_Resort

  - name: Load_Dim_Room
    path: Load_Dim_Room
    dependencies:
      - Load_Dim_Customer

  - name: Load_Dim_Resort
    path: Load_Dim_Resort
    timeoutPerCellInSeconds: 300